<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Painel de Controle 2026</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#14152B">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Dashboard 2026">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" href="icon-192.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg-body: #F1F2FA;
            --bg-sidebar: #14152B;
            --text-sidebar: #9A9DC2;
            --text-sidebar-hover: #ffffff;
            --bg-card: #ffffff;
            --text-main: #2B2D42;
            --text-muted: #767892;
            --primary: #6C5CE7;
            --primary-dark: #5642D6;
            --primary-soft: #EEEBFD;
            --radius-lg: 18px;
            --radius-md: 14px;
            --radius-sm: 10px;
            --shadow-soft: 0 4px 18px rgba(20, 21, 55, 0.06);
            --shadow-md: 0 10px 28px rgba(20, 21, 55, 0.12);
            --font-display: 'Sora', 'Segoe UI', sans-serif;
            --font-body: 'Inter', 'Segoe UI', sans-serif;
            /* cor da aba ativa; sobrescrita dinamicamente por aba via inline style */
            --tab-accent: var(--primary);
            --tab-accent-soft: var(--primary-soft);
        }
        * { box-sizing: border-box; }
        body { background-color: var(--bg-body); color: var(--text-main); font-family: var(--font-body); display: flex; height: 100vh; overflow: hidden; margin: 0; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4, h5, .btn, .sidebar-header h4 { font-family: var(--font-display); }

        ::selection { background: var(--primary-soft); color: var(--primary-dark); }
        :focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

        /* Sidebar */
        .sidebar { width: 266px; background-color: var(--bg-sidebar); color: var(--text-sidebar); display: flex; flex-direction: column; transition: 0.3s; z-index: 1000; box-shadow: 2px 0 20px rgba(0,0,0,0.15); }
        .sidebar-header { padding: 24px 22px 18px; }
        .sidebar-header h4 { color: white; margin: 0; font-size: 1.15rem; font-weight: 700; display: flex; align-items: center; gap: 10px; letter-spacing: -0.01em; }
        .sidebar-header .logo-badge { width: 38px; height: 38px; border-radius: 12px; background: linear-gradient(135deg, var(--primary), #9C6BFF); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; box-shadow: 0 4px 12px rgba(108,92,231,0.4); }
        .sidebar-header .logo-sub { display: block; font-size: 0.72rem; color: var(--text-sidebar); font-weight: 500; margin-top: 2px; }
        .nav-links { flex: 1; overflow-y: auto; padding: 8px 12px; display: flex; flex-direction: column; gap: 3px; }
        .nav-link { color: var(--text-sidebar); padding: 12px 14px; display: flex; align-items: center; gap: 12px; border-radius: var(--radius-sm); cursor: pointer; text-decoration: none; font-size: 0.92rem; font-weight: 600; transition: background 0.15s, color 0.15s, transform 0.1s; }
        .nav-link .nav-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; background: rgba(255,255,255,0.06); transition: 0.15s; }
        .nav-link:hover { background-color: rgba(255,255,255,0.06); color: var(--text-sidebar-hover); }
        .nav-link:active { transform: scale(0.98); }
        .nav-link.active { background-color: rgba(255,255,255,0.09); color: var(--text-sidebar-hover); }
        .nav-link.active .nav-icon { background: var(--tab-accent-color, var(--primary)); box-shadow: 0 2px 10px color-mix(in srgb, var(--tab-accent-color, var(--primary)) 60%, transparent); }
        
        /* Main Content */
        .main-content { flex: 1; padding: 28px; overflow-y: auto; position: relative; }
        .tab-content { display: none; background: var(--bg-card); border-radius: var(--radius-lg); box-shadow: var(--shadow-soft); padding: 24px; animation: fadeIn 0.35s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Header */
        .content-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid #ECEDF6; flex-wrap: wrap; gap: 14px; }
        .content-header-title { display: flex; align-items: center; gap: 14px; }
        .content-header .header-icon-badge { width: 46px; height: 46px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; background: var(--tab-accent-soft); flex-shrink: 0; }
        .content-header h2 { margin: 0; font-size: 1.4rem; color: #16172E; font-weight: 700; letter-spacing: -0.01em; }
        .content-header .item-count { margin: 0; font-size: 0.8rem; color: var(--text-muted); font-weight: 500; }

        /* Controles do cabeçalho: filtro de status + ordenar + novo item */
        .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .filter-select { width: auto; font-size: 0.85rem; font-weight: 600; border-radius: 999px; padding: 10px 16px; border: 1px solid #E4E5F1; background-color: #FAFAFE; }
        .filter-select:focus { border-color: var(--tab-accent-color, var(--primary)); box-shadow: 0 0 0 3px var(--tab-accent-soft); }

        /* Botões maiores e mais táteis */
        .btn { border-radius: var(--radius-sm); font-weight: 600; padding: 10px 18px; font-size: 0.9rem; transition: transform 0.12s ease, box-shadow 0.12s ease, filter 0.12s ease; border: none; }
        .btn:active { transform: scale(0.96); }
        .btn-primary, .btn-outline-secondary, .btn-outline-danger { border: none; }
        .btn-primary { background: var(--tab-accent-color, var(--primary)); box-shadow: 0 4px 14px color-mix(in srgb, var(--tab-accent-color, var(--primary)) 45%, transparent); }
        .btn-primary:hover, .btn-primary:focus { background: var(--tab-accent-color, var(--primary)); filter: brightness(0.92); box-shadow: 0 6px 18px color-mix(in srgb, var(--tab-accent-color, var(--primary)) 55%, transparent); }
        .btn-outline-secondary { background: #F1F2FA; color: #55577A; }
        .btn-outline-secondary:hover { background: #E4E5F1; color: #2B2D42; }
        .btn-outline-danger { background: #FDECEC; color: #D64545; }
        .btn-outline-danger:hover { background: #FBD9D9; color: #B93030; }
        .btn-success { background: #16A34A; }
        .btn-sm { padding: 8px 14px; font-size: 0.82rem; border-radius: 999px; }

        /* Destaque no nome do item */
        .cell-item-name { font-weight: 700; color: #16172E; font-size: 1.02rem; font-family: var(--font-display); }

        /* Destaque sutil na borda esquerda do card/linha, conforme o status */
        tr[data-status] { border-left: 4px solid transparent; }
        tr[data-status="status-concluido"] { border-left-color: #16A34A; }
        tr[data-status="status-aberto"] { border-left-color: #2563EB; }
        tr[data-status="status-aguardando"] { border-left-color: #F59E0B; }
        tr[data-status="status-na"] { border-left-color: #CBD1E8; }

        /* No modo tabela (desktop), border-collapse ignora a borda do <tr>, então reforçamos na 1ª célula */
        tr[data-status] > td:first-child { border-left: 4px solid transparent; }
        tr[data-status="status-concluido"] > td:first-child { border-left-color: #16A34A; }
        tr[data-status="status-aberto"] > td:first-child { border-left-color: #2563EB; }
        tr[data-status="status-aguardando"] > td:first-child { border-left-color: #F59E0B; }
        tr[data-status="status-na"] > td:first-child { border-left-color: #CBD1E8; }
        
        /* Table Controls */
        .table-responsive { max-height: calc(100vh - 200px); overflow-y: auto; border-radius: var(--radius-md); border: 1px solid #ECEDF6; }
        table { margin: 0; width: 100%; border-collapse: collapse; }
        table th { position: sticky; top: 0; background: #FAFAFE; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.04); color: var(--text-muted); font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; padding: 14px 16px; border-bottom: 2px solid #ECEDF6; cursor: pointer; transition: background 0.2s; user-select: none; }
        table th:hover { background-color: #F1F2FA; color: #16172E; }
        table td { padding: 13px 16px; border-bottom: 1px solid #F1F2FA; vertical-align: middle; font-size: 0.92rem; }
        table tbody tr { transition: background-color 0.15s; }
        table tbody tr:hover { background-color: #FAFAFE; }
        
        /* Editable Cells */
        .editable-cell { cursor: text; padding: 7px 8px; border-radius: 8px; transition: 0.15s; min-height: 24px; display: block; width: 100%; border: 1px solid transparent; }
        .editable-cell:hover { border-color: #E4E5F1; background-color: #FAFAFE; }
        .editable-cell:focus { outline: none; box-shadow: 0 0 0 3px var(--tab-accent-soft); background-color: #fff; border-color: var(--tab-accent-color, var(--primary)); }
        
        /* Status Badges */
        .status-select { border: none; font-size: 0.72rem; font-weight: 700; border-radius: 999px; padding: 7px 14px; cursor: pointer; outline: none; appearance: none; text-align: center; text-transform: uppercase; letter-spacing: 0.3px; }
        .status-concluido { background-color: #DCFCE7; color: #15803D; }
        .status-aberto { background-color: #DBEAFE; color: #1D4ED8; }
        .status-aguardando { background-color: #FEF3C7; color: #B45309; }
        .status-na { background-color: #F1F2FA; color: #6B6E8F; }
        
        /* Progress Input + barra visual */
        .progress-wrapper { display: flex; align-items: center; gap: 10px; }
        .progress-track { flex: 1; min-width: 46px; max-width: 90px; height: 8px; background: #ECEDF6; border-radius: 999px; overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 999px; background: var(--tab-accent-color, var(--primary)); transition: width 0.3s ease; }
        .progress-input { width: 58px; padding: 6px 8px; border: 1px solid #E4E5F1; border-radius: var(--radius-sm); text-align: right; font-size: 0.88rem; font-weight: 600; }
        .progress-input:focus { outline: none; box-shadow: 0 0 0 3px var(--tab-accent-soft); border-color: var(--tab-accent-color, var(--primary)); }
        
        /* Medals (Notas) */
        .nota-medal { display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-weight: 700; padding: 6px 12px; border-radius: 999px; border: none; cursor: text; min-width: 50px;}
        .nota-ouro { color: #92400E; background: #FEF3C7; } /* Gold */
        .nota-prata { color: #3F3F5C; background: #EEEFF7; } /* Silver */
        .nota-bronze { color: #7C2D12; background: #FFEDD5; } /* Bronze */
        
        /* Floating Buttons */
        .btn-save-float { position: fixed; bottom: 25px; right: 25px; border-radius: 999px; padding: 13px 22px; box-shadow: var(--shadow-md); z-index: 1000; display: none; font-weight: 700; font-size: 0.92rem; transition: opacity 0.3s, transform 0.2s; opacity: 1; background: #16A34A; color: white; }
        .btn-save-float:hover { transform: translateY(-2px); }
        
        /* Actions Column */
        .action-btns { display: flex; gap: 6px; }
        .btn-icon { padding: 7px 11px; font-size: 0.95rem; border-radius: var(--radius-sm); }
        
        /* Sort Icons */
        .sort-icon { font-size: 0.8rem; margin-left: 5px; color: var(--tab-accent-color, var(--primary)); }

        /* Botão hambúrguer (só aparece no mobile) */
        .btn-menu-toggle {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 1100;
            width: 46px;
            height: 46px;
            border-radius: var(--radius-sm);
            border: none;
            background: var(--bg-sidebar);
            color: white;
            font-size: 1.3rem;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow-md);
            transition: transform 0.12s;
        }
        .btn-menu-toggle:active { transform: scale(0.92); }

        /* Fundo escurecido atrás do menu aberto no mobile */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15,16,35,0.5);
            backdrop-filter: blur(2px);
            z-index: 999;
        }

        /* ================= MOBILE (celular) ================= */
        @media (max-width: 768px) {
            body { overflow: auto; }

            .btn-menu-toggle { display: flex; }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                transform: translateX(-100%);
                width: 82vw;
                max-width: 300px;
                transition: transform 0.25s ease;
            }
            .sidebar.mobile-open { transform: translateX(0); }
            .sidebar.mobile-open ~ .sidebar-overlay { display: block; }
            .nav-link { padding: 15px 14px; font-size: 1rem; }

            .main-content { padding: 76px 12px 100px 12px; width: 100%; }

            .tab-content { border-radius: var(--radius-md); padding: 16px; }

            .content-header { flex-wrap: wrap; gap: 12px; margin-bottom: 18px; padding-bottom: 14px; }
            .content-header h2 { font-size: 1.2rem; }
            .content-header .header-icon-badge { width: 42px; height: 42px; font-size: 1.25rem; }
            .content-header .btn { font-size: 0.88rem; padding: 11px 16px; }
            .header-controls { width: 100%; }
            .header-controls .btn, .header-controls select { flex: 1; min-width: 0; }

            table th, table td { padding: 9px 10px; font-size: 0.85rem; }

            .table-responsive { max-height: none; overflow-x: hidden; border: none; }

            /* Tabela vira uma lista de "cards" empilhados, sem precisar rolar de lado */
            table thead { display: none; }
            table, table tbody, table tr, table td { display: block; width: 100%; }
            table {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            table tr {
                background: #fff;
                border: 1px solid #ECEDF6;
                border-radius: var(--radius-md);
                padding: 6px 14px;
                box-shadow: var(--shadow-soft);
            }
            table td {
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 10px;
                padding: 10px 0;
                border-bottom: 1px solid #F4F5FA;
                font-size: 0.88rem;
                min-height: 40px;
            }
            table tr td:last-child { border-bottom: none; }
            table td::before {
                content: attr(data-label);
                font-weight: 700;
                color: #A2A5C4;
                font-size: 0.66rem;
                text-transform: uppercase;
                letter-spacing: 0.4px;
                flex-shrink: 0;
                margin-right: 8px;
            }
            table td.td-actions {
                justify-content: flex-end;
                padding: 8px 0;
                border-left: none !important;
            }
            table td.td-actions::before { content: none; }
            .btn-icon { padding: 9px 13px; font-size: 1.05rem; }

            .editable-cell { text-align: right; padding: 4px 6px; }
            .status-select { font-size: 0.72rem; padding: 8px 14px; }
            .progress-wrapper { justify-content: flex-end; }
            .progress-track { max-width: 60px; }
            .nota-medal { min-width: 0; padding: 5px 10px; font-size: 0.88rem; }

            .btn-save-float {
                left: 14px;
                right: 14px;
                bottom: 14px;
                text-align: center;
                font-size: 0.9rem;
            }

            .progress-input { width: 55px; padding: 8px; }
        }
    </style>
</head>
<body>

    <button class="btn-menu-toggle" id="btnMenuToggle" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </button>

    <div class="btn btn-success btn-save-float" id="btnSave" style="pointer-events: none;">
        <i class="bi bi-cloud-check-fill"></i> Salvo automaticamente
    </div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h4><span class="logo-badge">🚀</span> <span style="display:flex; flex-direction:column; line-height:1.3;">Dashboard 2026<span class="logo-sub">Seu painel pessoal</span></span></h4>
        </div>
        <div class="nav-links" id="navLinks">
            </div>
        <div class="p-3" style="border-top: 1px solid rgba(255,255,255,0.08);">
            <button class="btn btn-outline-light w-100 btn-sm mb-2" onclick="exportData()" style="background: rgba(255,255,255,0.06); color: #fff;">
                <i class="bi bi-download"></i> Fazer Backup
            </button>
            <div class="text-center" style="font-size: 0.7rem; color: var(--text-sidebar);">
                Dados salvos no seu navegador.
            </div>
        </div>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <div class="main-content" id="mainContent"></div>

    <div class="modal fade" id="addModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="modalTitle">Novo Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody">
                    </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="saveNewItem()">Adicionar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        let appData = {};

        // Cada área da vida ganha sua própria cor de identidade
        const TAB_ACCENTS = {

        };
        function getAccent(key) {
            return TAB_ACCENTS[key] || { color: '#6C5CE7', soft: '#EEEBFD' };
        }
        function splitTitle(title) {
            const parts = title.split(' ');
            return { icon: parts[0], label: parts.slice(1).join(' ') };
        }

        // ==========================================
        // INICIALIZAÇÃO
        // ==========================================
        function initApp() {
            const saved = localStorage.getItem('dashboard2026_data_v6');
            if (saved) {
                appData = JSON.parse(saved);
                for(let k in initialData) {
                    if(!appData[k]) appData[k] = initialData[k];
                }
            } else {
                appData = JSON.parse(JSON.stringify(initialData));
            }
            
            renderMenu();
            renderAllTabs();
            showTab(Object.keys(appData)[0]);
        }

        // ==========================================
        // RENDERIZAÇÃO
        // ==========================================
        function renderMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.innerHTML = "";
            for (const key in appData) {
                const tab = appData[key];
                const accent = getAccent(key);
                const { icon, label } = splitTitle(tab.title);
                navLinks.innerHTML += `<a class="nav-link" id="nav-${key}" style="--tab-accent-color:${accent.color}; --tab-accent-soft:${accent.soft};" onclick="showTab('${key}')"><span class="nav-icon">${icon}</span><span>${escapeHtml(label)}</span></a>`;
            }
        }

        function showTab(tabId) {
            currentTabId = tabId;
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
            
            document.getElementById(`tab-${tabId}`).classList.add('active');
            document.getElementById(`nav-${tabId}`).classList.add('active');
            closeSidebar();
        }

        // ==========================================
        // MENU MOBILE (abrir/fechar)
        // ==========================================
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('mobile-open');
        }
        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('mobile-open');
        }

        function renderAllTabs() {
            const container = document.getElementById('mainContent');
            container.innerHTML = "";

            for (const key in appData) {
                const tabData = appData[key];
                const statusCol = tabData.columns.find(c => c.toUpperCase().includes("STATUS"));
                const currentFilter = filterConfig[key] || "ALL";
                const accent = getAccent(key);
                const { icon, label } = splitTitle(tabData.title);
                
                let html = `
                    <div id="tab-${key}" class="tab-content" style="--tab-accent-color:${accent.color}; --tab-accent-soft:${accent.soft};">
                        <div class="content-header">
                            <div class="content-header-title">
                                <div class="header-icon-badge">${icon}</div>
                                <div>
                                    <h2>${escapeHtml(label)}</h2>
                                    <p class="item-count">${tabData.rows.length} ${tabData.rows.length === 1 ? 'item' : 'itens'}</p>
                                </div>
                            </div>
                            <div class="header-controls">
                                ${statusCol ? `
                                <select class="form-select form-select-sm filter-select" onchange="filterByStatus('${key}', this.value)">
                                    <option value="ALL" ${currentFilter === 'ALL' ? 'selected' : ''}>Todos os status</option>
                                    <option value="CONCLUIDO" ${currentFilter === 'CONCLUIDO' ? 'selected' : ''}>Concluído</option>
                                    <option value="ABERTO" ${currentFilter === 'ABERTO' ? 'selected' : ''}>Aberto</option>
                                    <option value="AGUARDANDO" ${currentFilter === 'AGUARDANDO' ? 'selected' : ''}>Aguardando</option>
                                    <option value="VAZIO" ${currentFilter === 'VAZIO' ? 'selected' : ''}>Não iniciado</option>
                                </select>
                                <button class="btn btn-outline-secondary btn-sm" onclick="sortTable('${key}', '${statusCol}')" title="Ordenar por status">
                                    <i class="bi bi-sort-down"></i> Status
                                </button>` : ''}
                                <button class="btn btn-primary" onclick="openAddModal('${key}')">
                                    <i class="bi bi-plus-lg"></i> Novo Item
                                </button>
                            </div>
                        </div>
                        <div class="table-responsive">
                            <table class="table">
                                <thead>
                                    <tr>
                                        <th style="width: 95px; cursor:default;">Ações</th>
                `;
                
                // Cabeçalhos com lógica de Ordenação
                tabData.columns.forEach(col => {
                    let sortIcon = "";
                    if(sortConfig[key] && sortConfig[key].col === col) {
                        sortIcon = sortConfig[key].dir === 'asc' ? '<i class="bi bi-caret-up-fill sort-icon"></i>' : '<i class="bi bi-caret-down-fill sort-icon"></i>';
                    }
                    html += `<th onclick="sortTable('${key}', '${col}')" title="Clique para ordenar">${col} ${sortIcon}</th>`;
                });
                
                html += `           </tr>
                                </thead>
                                <tbody>
                `;

                // Linhas (aplicando filtro de status, se houver)
                let rowsToRender = tabData.rows;
                if (statusCol && currentFilter !== "ALL") {
                    rowsToRender = tabData.rows.filter(row => {
                        let v = (row[statusCol] || "").toString().toUpperCase().trim();
                        if (v === "CONCLUÍDO") v = "CONCLUIDO";
                        if (currentFilter === "VAZIO") return v === "";
                        return v === currentFilter;
                    });
                }

                rowsToRender.forEach(row => {
                    let rowStatusClass = statusCol ? getStatusClass(row[statusCol]) : "";
                    html += `<tr id="tr-${row.id}" data-status="${rowStatusClass}">

                                        <button class="btn btn-outline-danger btn-icon" onclick="deleteRow('${key}', '${row.id}')" title="Excluir"><i class="bi bi-trash3"></i></button>
                                    </div>
                                </td>`;
                    
                    tabData.columns.forEach(col => {
                        html += `<td data-label="${escapeHtml(col)}">${renderCell(key, row, col)}</td>`;
                    });
                    
                    html += `</tr>`;

                html += `
                                </tbody>

                        </div>
                    </div>
                `;
                container.innerHTML += html;

        // ==========================================
        // ORDENAÇÃO DE COLUNAS (NOVO)
        // ==========================================
        // ==========================================
        // FILTRO POR STATUS
        // ==========================================
        function filterByStatus(tabKey, value) {
            filterConfig[tabKey] = value;
            renderAllTabs();
            showTab(tabKey);
        }

        function sortTable(tabKey, colName) {
            if (!sortConfig[tabKey]) sortConfig[tabKey] = { col: null, dir: 'asc' };
            
            let currentSort = sortConfig[tabKey];
            
            // Inverte direção se clicar na mesma coluna
            if (currentSort.col === colName) {
                currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
            } else {
                currentSort.col = colName;
                currentSort.dir = 'asc';
            }

            // Prioridade especial para a coluna STATUS: não iniciado (Selecione) primeiro, concluído por último
            const STATUS_PRIORITY = { "": 0, "ABERTO": 1, "AGUARDANDO": 2, "CONCLUIDO": 3, "REALIZADO": 3 };

            // Lógica de parser para descobrir se é número, texto, status ou vazio
            const parseVal = (v) => {
                let colUpper = colName.toUpperCase().trim();

                if (colUpper.includes("STATUS")) {
                    let s = (v === undefined || v === null) ? "" : String(v).trim().toUpperCase();
                    if (s === "CONCLUÍDO") s = "CONCLUIDO";
                    return STATUS_PRIORITY.hasOwnProperty(s) ? STATUS_PRIORITY[s] : 1.5;
                }

                if(v === undefined || v === null || v === "") return "";
                let str = String(v).trim();
                
                if(colUpper === "NOTA" || colUpper.includes("PROGRESSO") || colUpper === "KM" || colUpper === "VALOR" || colUpper === "#") {
                    let num = parseFloat(str.replace(/[^0-9.-]+/g,""));
                    return isNaN(num) ? -999999 : num; // Joga pra baixo se não for número validado
                }
                return str.toUpperCase();
            };

            appData[tabKey].rows.sort((a, b) => {
                let pA = parseVal(a[colName]);
                let pB = parseVal(b[colName]);
                
                // Joga os vazios sempre para o final da lista (não se aplica à coluna STATUS, que já tem prioridade própria)
                if(pA === "" && pB !== "") return 1;
                if(pB === "" && pA !== "") return -1;
                if(pA === "" && pB === "") return 0;

                if (pA < pB) return currentSort.dir === 'asc' ? -1 : 1;
                if (pA > pB) return currentSort.dir === 'asc' ? 1 : -1;
                return 0;
            });
            
            autoSave();
            renderAllTabs();
            showTab(tabKey);
        }

        // ==========================================
        // ESCAPE SEGURO (evita quebrar o HTML com < > & " ')
        // ==========================================
        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        // ==========================================
        // LÓGICA DAS CÉLULAS (Medalhas, Status, Barras)
        // ==========================================
        function renderCell(tabKey, row, colName) {
            let val = row[colName] !== undefined ? row[colName] : "";
            let safeVal = escapeHtml(val);
            let colUpper = colName.toUpperCase().trim();
            
            // STATUS
            if (colUpper.includes("STATUS")) {
                const statuses = ["CONCLUIDO", "ABERTO", "AGUARDANDO", ""];
                let v = val.toString().toUpperCase().trim();
                if(v === "CONCLUÍDO") v = "CONCLUIDO";
                
                let select = `<select class="status-select ${getStatusClass(v)}" onchange="updateData('${tabKey}', '${row.id}', '${colName}', this.value); this.className='status-select ' + getStatusClass(this.value)">`;
                statuses.forEach(s => {
                    let text = s === "" ? "SELECIONE" : s;
                    select += `<option value="${s}" ${v === s ? 'selected' : ''}>${text}</option>`;
                });
                select += `</select>`;
                return select;
            }
            
            // PROGRESSO
            if (colUpper.includes("PROGRESSO")) {
                let num = parseInt(val) || 0;
                return `
                    <div class="progress-wrapper">
                        <div class="progress-track"><div class="progress-fill" style="width:${num}%;"></div></div>
                        <input type="number" class="progress-input" value="${num}" min="0" max="100" 
                        onchange="handleProgressChange('${tabKey}', '${row.id}', '${colName}', this.value)"> %
                    </div>
                `;
            }
            
            // NOTA (Medalhas de Ouro, Prata, Bronze)
            if (colUpper === "NOTA") {
                let numVal = parseFloat(val);
                
                if (!isNaN(numVal) && val !== "") {
                    if (numVal === 10) {
                        return `<span class="nota-medal nota-ouro" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥇 ${escapeHtml(numVal)}</span>`;
                    } else if (numVal >= 9) {
                        return `<span class="nota-medal nota-prata" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥈 ${escapeHtml(numVal)}</span>`;
                    } else if (numVal >= 7 && numVal < 9) {
                        return `<span class="nota-medal nota-bronze" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText.replace(/[^0-9.]/g, '').trim())">🥉 ${escapeHtml(numVal)}</span>`;
                    }
                }
            }
            
            // CÉLULA PADRÃO (Texto editável)
            let itemClass = colUpper === "ITEM" ? "editable-cell cell-item-name" : "editable-cell";
            return `<span class="${itemClass}" contenteditable="true" onblur="updateData('${tabKey}', '${row.id}', '${colName}', this.innerText)">${safeVal}</span>`;
        }

        function getStatusClass(val) {
            let v = val.toString().toUpperCase().trim();
            if (v === "CONCLUIDO" || v === "REALIZADO") return "status-concluido";
            if (v === "ABERTO") return "status-aberto";
            if (v === "AGUARDANDO" || v === "STAND BY") return "status-aguardando";
            return "status-na";
        }

        // ==========================================
        // ATUALIZAÇÃO E REGRAS DE NEGÓCIO
        // ==========================================
        function updateData(tabKey, rowId, colName, value) {
            let row = appData[tabKey].rows.find(r => r.id === rowId);
            if (row && row[colName] !== value) {
                row[colName] = value;
                autoSave();
                
                // Se atualizou nota, re-renderiza para processar a medalha
                if(colName.toUpperCase().trim() === "NOTA") {
                    renderAllTabs();
                    showTab(tabKey);
                }
            }
        }

        // Função Especial para Progresso (Dispara Animação e Status)
        function handleProgressChange(tabKey, rowId, colName, value) {
            let row = appData[tabKey].rows.find(r => r.id === rowId);
            if (row) {
                let num = parseInt(value) || 0;
                if(num > 100) num = 100;
                row[colName] = num.toString();
                autoSave();

                // Regra: Se chegou a 100%, muda o status para CONCLUIDO
                if (num === 100) {
                    let statusCol = appData[tabKey].columns.find(c => c.toUpperCase().includes("STATUS"));
                    if (statusCol && row[statusCol] !== "CONCLUIDO" && row[statusCol] !== "REALIZADO") {
                        row[statusCol] = "CONCLUIDO";
                        triggerConfetti();
                    }
                }
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function triggerConfetti() {
            if(typeof confetti === "function") {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#6C5CE7', '#16A34A', '#F59E0B', '#DB2777']
                });
            }
        }

        // ==========================================
        // AÇÕES DA TABELA (Duplicar, Excluir, Adicionar)
        // ==========================================
        function duplicateRow(tabKey, rowId) {
            const tabData = appData[tabKey];
            const originalRow = tabData.rows.find(r => r.id === rowId);
            if (originalRow) {
                let newRow = JSON.parse(JSON.stringify(originalRow));
                newRow.id = "id_" + Date.now();
                
                let index = tabData.rows.findIndex(r => r.id === rowId);
                tabData.rows.splice(index + 1, 0, newRow);
                
                autoSave();
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function deleteRow(tabKey, rowId) {
            if(confirm("Tem certeza que deseja excluir este item?")) {
                appData[tabKey].rows = appData[tabKey].rows.filter(r => r.id !== rowId);
                autoSave();
                renderAllTabs();
                showTab(tabKey);
            }
        }

        function openAddModal(tabKey) {
            currentModalTab = tabKey;
            const tabData = appData[tabKey];
            document.getElementById('modalTitle').innerText = `Novo em: ${tabData.title}`;
            
            let formHtml = `<form id="addForm">`;
            tabData.columns.forEach(col => {
                let colU = col.toUpperCase().trim();
                formHtml += `<div class="mb-3"><label class="form-label">${col}</label>`;
                
                if (colU.includes("STATUS")) {
                    formHtml += `<select class="form-select" id="input-${col}">
                                    <option value="ABERTO">ABERTO</option>
                                    <option value="AGUARDANDO">AGUARDANDO</option>
                                    <option value="CONCLUIDO">CONCLUÍDO</option>
                                 </select>`;
                } else if (colU.includes("PROGRESSO")) {
                    formHtml += `<input type="number" class="form-control" id="input-${col}" value="0" min="0" max="100">`;
                } else {
                    formHtml += `<input type="text" class="form-control" id="input-${col}">`;
                }
                
                formHtml += `</div>`;
            });
            formHtml += `</form>`;
            
            document.getElementById('modalBody').innerHTML = formHtml;
            new bootstrap.Modal(document.getElementById('addModal')).show();
        }

        function saveNewItem() {
            const tabData = appData[currentModalTab];
            let newRow = { id: "id_" + Date.now() }; 
            
            tabData.columns.forEach(col => {
                newRow[col] = document.getElementById(`input-${col}`).value;
            });
            
            tabData.rows.push(newRow);
            autoSave();
            
            bootstrap.Modal.getInstance(document.getElementById('addModal')).hide();
            renderAllTabs();
            showTab(currentModalTab);
        }

        // ==========================================
        // SALVAR AUTOMATICAMENTE (a cada alteração)
        // ==========================================
        let autoSaveIndicatorTimeout = null;

        function autoSave() {
            localStorage.setItem('dashboard2026_data_v6', JSON.stringify(appData));

            const btn = document.getElementById('btnSave');
            btn.innerHTML = '<i class="bi bi-cloud-check-fill"></i> Salvo automaticamente';
            btn.style.display = 'block';
            btn.style.opacity = '1';

            clearTimeout(autoSaveIndicatorTimeout);
            autoSaveIndicatorTimeout = setTimeout(() => {
                btn.style.opacity = '0';
                setTimeout(() => { btn.style.display = 'none'; }, 300);
            }, 1200);
        }

        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData));
            const a = document.createElement('a');
            a.href = dataStr;
            a.download = "backup_dashboard_2026_final.json";
            document.body.appendChild(a);
            a.click();
            a.remove();
        }

        window.onload = initApp;

        // ==========================================
        // REGISTRO DO SERVICE WORKER (permite instalar como app)
        // ==========================================
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(() => {
                    /* falha silenciosa: app continua funcionando normalmente sem cache offline */
                });
            });
        }
    </script>
</body>
</html>
